[ExtendedInformationRedux3.AbilityLib]

; ============================================================
;  Extended Information Redux - Ability Chance Preview Blacklist
; ============================================================
;
; This section allows you to completely disable the chance preview
; (ApplyChance-based abilities) for specific abilities.
;
; ------------------------
; HOW IT WORKS
; ------------------------
;
; Each entry must follow this format:
;
; +AbilityChancePreviewBlacklist="PackageName.AbilityTemplateName"
;
; Where:
;
; - PackageName          ? The package where the ability class is defined
;                          (usually the mod name or "XComGame")
;
; - AbilityTemplateName  ? The EXACT template name of the ability
;                          (returned by GetMyTemplateName())
;
; ------------------------
; WHEN TO USE THIS
; ------------------------
;
; Use this if:
; - The preview shows incorrect or misleading probabilities
; - The ability uses complex or scripted logic that cannot be
;   accurately represented by ApplyChance
; - The ability produces duplicate or conflicting effects
;
; ------------------------
; IMPORTANT NOTES
; ------------------------
;
; - Matching is EXACT and case-sensitive
;
; - The format must be:
;     PackageName.AbilityTemplateName
;
; - If the ability is blacklisted:
;     ? NO chance preview will be shown at all
;
; ------------------------
; EXAMPLES
; ------------------------
;
; Disable preview for LW Flamethrower:
;+AbilityChancePreviewBlacklist="LW_Overhaul.LWFlamethrower"
;
; Disable preview for Void Rift:
;+AbilityChancePreviewBlacklist="XComGame.VoidRift"
;
; Disable preview for Saturation Fire:
;+AbilityChancePreviewBlacklist="XComGame.SaturationFire" 
; ============================================================

+AbilityChancePreviewBlacklist="XComGame.Roust"
+AbilityChancePreviewBlacklist="XComGame.MZShotgunWedding"
+AbilityChancePreviewBlacklist="XComGame.MZPsiBullet"
+AbilityChancePreviewBlacklist="XComGame.MZBlindRuneshot"
+AbilityChancePreviewBlacklist="XComGame.MZListonStyle"
+AbilityChancePreviewBlacklist="XComGame.MZBladeDance"
+AbilityChancePreviewBlacklist="XComGame.MZMassFuse"

[ExtendedInformationRedux3.StatContestLib]

; ============================================================
;  Extended Information Redux - Stat Contest Effect Overrides
; ============================================================
;
; This section allows you to manually mark certain effects as
; "relevant" for stat contest preview (e.g. Insanity-like abilities),
; in case they are not automatically detected by the mod.
;
; ------------------------
; HOW IT WORKS
; ------------------------
;
; Each entry has the following format:
;
; +RelevantEffects=(PackageName="Package",ClassName="EffectClass",AbilityName="OptionalAbility")
;
; Fields:
;
; - PackageName   ? The package where the effect class is defined
;                   (e.g. "XComGame", "MyMod")
;
; - ClassName     ? The exact UnrealScript class name of the effect
;                   (e.g. "X2Effect_RemoveEffects")
;
; - AbilityName   ? (OPTIONAL)
;                   If specified ? applies ONLY to this ability
;                   If omitted   ? applies to ALL abilities
;
; ------------------------
; WHEN TO USE THIS
; ------------------------
;
; Use this if:
; - An effect is not showing in the preview but should be while aiming with the stat ceontest ability (e.g. Insanity)
; - The effect has a stat contest, i.e. it has MinStatContestResult and MaxStatContestResult values
;
; ------------------------
; IMPORTANT NOTES
; ------------------------
;
; - Matching is done by BOTH PackageName and ClassName
;   (this avoids conflicts between mods using same class names)
;
; - AbilityName is optional:
;     • If omitted ? acts as a wildcard (all abilities)
;     • If specified ? only applies to that ability
;
; - AbilityName must match Template name exactly
;   (e.g. "Insanity", "VoidRiftInsanity", etc.)
;
; ------------------------
; EXAMPLES
; ------------------------
;
; Apply ONLY to Insanity ability:
;+RelevantEffects=(PackageName="XComGame",ClassName="X2Effect_RemoveEffects",AbilityName="Insanity")
;
; Apply to ALL abilities:
;+RelevantEffects=(PackageName="XComGame",ClassName="X2Effect_RemoveEffects")
;
; ============================================================

[ExtendedInformationRedux3.ApplyChanceLib]

; ============================================================
;  Extended Information Redux - Effect Chance Preview Blacklist
; ============================================================
;
; This section allows you to exclude specific effects from the
; ApplyChance-based preview (e.g. abilities like Void Rift).
;
; ------------------------
; HOW IT WORKS
; ------------------------
;
; Each entry must follow this format:
;
; +EffectChancePreviewBlacklist="PackageName.EffectClassName"
;
; Where:
;
; - PackageName       ? The package where the effect class is defined
;                       (e.g. "XComGame", "LW_Overhaul", "MyMod")
;
; - EffectClassName   ? The exact UnrealScript class name of the effect
;                       (e.g. "X2Effect_TriggerEvent")
;
; ------------------------
; WHEN TO USE THIS
; ------------------------
;
; Use this if:
; - An effect appears in the preview but should be hidden
; - The effect produces misleading or redundant information
; - The effect is purely technical (e.g. world damage, triggers)
;
; ------------------------
; IMPORTANT NOTES
; ------------------------
;
; - This blacklist ONLY applies to:
;     ? Effects using .ApplyChance
;     ? (e.g. Void Rift-style abilities)
;
; - This does NOT affect:
;     ? Stat contest abilities (e.g. Insanity)
;     ? Effects using MinStatContestResult / MaxStatContestResult
;
; - Matching is EXACT and case-sensitive
;
; - The format must be:
;     PackageName.EffectClassName
;
; ------------------------
; EXAMPLES
; ------------------------
;
; Hide directional world damage effect:
;+EffectChancePreviewBlacklist="LW_Overhaul.X2Effect_MaybeApplyDirectionalWorldDamage"
;
; Hide trigger event effects:
;+EffectChancePreviewBlacklist="XComGame.X2Effect_TriggerEvent"
;
; ============================================================

+EffectChancePreviewBlacklist="XComGame.X2Effect_ApplyDirectionalWorldDamage"
+EffectChancePreviewBlacklist="LW_Overhaul.X2Effect_MaybeApplyDirectionalWorldDamage"
+EffectChancePreviewBlacklist="SavageItems.XMBEffect_PermanentStatChange"